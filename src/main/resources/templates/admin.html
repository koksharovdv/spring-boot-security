<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white">
        <span th:text="${#authentication.name}"></span>
        with roles:
        <span th:each="role : ${#authentication.authorities}"
              th:text="${role.authority} + ' '"></span>
    </span>

    <form th:action="@{/logout}" method="post">
        <button class="btn btn-link text-white">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- ===== SIDEBAR ===== -->
        <div class="col-2 bg-light vh-100 pt-3">
            <div class="list-group">
                <a href="/admin" class="list-group-item list-group-item-action active">Admin</a>
                <a href="/user" class="list-group-item list-group-item-action">User</a>
            </div>
        </div>

        <!-- ===== MAIN ===== -->
        <div class="col-10 p-4">

            <h2>Admin panel</h2>

            <!-- ===== TABS ===== -->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#table">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#new">New User</a>
                </li>
            </ul>

            <div class="tab-content">

                <!-- ===== USERS TABLE ===== -->
                <div class="tab-pane fade show active" id="table">

                    <div class="card mt-3">
                        <div class="card-header">
                            All users
                        </div>

                        <div class="card-body">

                            <table class="table table-striped">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Email</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Roles</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td th:text="${user.firstName}"></td>
                                    <td th:text="${user.lastName}"></td>

                                    <td>
                                        <span th:each="role : ${user.roles}"
                                              th:text="${role.name} + ' '"></span>
                                    </td>

                                    <!-- EDIT -->
                                    <td>
                                        <button class="btn btn-info btn-sm"
                                                data-bs-toggle="modal"
                                                data-bs-target="#editModal"
                                                th:attr="
                                                data-id=${user.id},
                                                data-email=${user.email},
                                                data-firstname=${user.firstName},
                                                data-lastname=${user.lastName}">
                                            Edit
                                        </button>
                                    </td>

                                    <!-- DELETE -->
                                    <td>
                                        <button class="btn btn-danger btn-sm"
                                                data-bs-toggle="modal"
                                                data-bs-target="#deleteModal"
                                                th:attr="
                                                data-id=${user.id},
                                                data-email=${user.email},
                                                data-firstname=${user.firstName},
                                                data-lastname=${user.lastName}">
                                            Delete
                                        </button>
                                    </td>

                                </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>

                <!-- ===== NEW USER ===== -->
                <div class="tab-pane fade" id="new">

                    <div class="card mt-3">
                        <div class="card-header">
                            Add new user
                        </div>

                        <div class="card-body d-flex justify-content-center">

                            <form th:action="@{/admin}" th:object="${user}" method="post" class="w-50">

                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">First name</label>
                                    <input type="text" class="form-control text-center" th:field="*{firstName}">
                                </div>

                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Last name</label>
                                    <input type="text" class="form-control text-center" th:field="*{lastName}">
                                </div>

                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="text" class="form-control text-center" th:field="*{email}">
                                </div>

                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Password</label>
                                    <input type="password" class="form-control text-center" th:field="*{password}">
                                </div>

                                <!-- ROLES -->
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold">Role</label>
                                    <select class="form-select text-center" multiple th:field="*{roles}">
                                        <option th:each="role : ${roles}"
                                                th:value="${role.id}"
                                                th:text="${role.name}">
                                        </option>
                                    </select>
                                </div>

                                <div class="text-center">
                                    <button class="btn btn-success">
                                        Add new user
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- ===== EDIT MODAL ===== -->
<div class="modal fade" id="editModal">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <form th:action="@{/admin}" method="post">

                <input type="hidden" name="id" id="editId">

                <input class="form-control mb-2" name="firstName" id="editFirstName">
                <input class="form-control mb-2" name="lastName" id="editLastName">
                <input class="form-control mb-2" name="email" id="editEmail">
                <input class="form-control mb-2" name="password" placeholder="new password">

                <button class="btn btn-primary">Edit</button>
            </form>

        </div>
    </div>
</div>

<!-- ===== DELETE MODAL ===== -->
<div class="modal fade" id="deleteModal">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <form th:action="@{/admin/delete}" method="post">
                <input type="hidden" name="id" id="deleteId">
                <button class="btn btn-danger">Delete</button>
            </form>

        </div>
    </div>
</div>

<!-- JS -->
<script>
    document.addEventListener('show.bs.modal', function (event) {
        let button = event.relatedTarget;

        if (button) {
            document.getElementById('editId').value = button.getAttribute('data-id');
            document.getElementById('editEmail').value = button.getAttribute('data-email');
            document.getElementById('editFirstName').value = button.getAttribute('data-firstname');
            document.getElementById('editLastName').value = button.getAttribute('data-lastname');

            document.getElementById('deleteId').value = button.getAttribute('data-id');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
