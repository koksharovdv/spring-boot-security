<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Admin panel</h2>


    <!-- USERS TABLE -->
    <div class="card mt-3">

        <div class="card-header">
            All users
        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Roles</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
                </thead>

                <tbody id="usersTable"></tbody>

            </table>

        </div>
    </div>



    <!-- CREATE -->
    <div class="card mt-4">

        <div class="card-header">
            Add new user
        </div>

        <div class="card-body">

            <input id="firstName"
                   class="form-control mb-2"
                   placeholder="First name">


            <input id="lastName"
                   class="form-control mb-2"
                   placeholder="Last name">


            <input id="email"
                   class="form-control mb-2"
                   placeholder="Email">


            <input id="password"
                   type="password"
                   class="form-control mb-2"
                   placeholder="Password">


            <select id="roles"
                    class="form-select mb-3"
                    multiple>

                <option value="1">
                    ADMIN
                </option>

                <option value="2">
                    USER
                </option>

            </select>


            <button class="btn btn-success"
                    onclick="createUser()">

                Add user

            </button>

        </div>
    </div>

</div>



<!-- EDIT MODAL -->
<div class="modal fade" id="editModal">

    <div class="modal-dialog">

        <div class="modal-content p-3">

            <input type="hidden"
                   id="editId">


            <input class="form-control mb-2"
                   id="editFirstName">


            <input class="form-control mb-2"
                   id="editLastName">


            <input class="form-control mb-2"
                   id="editEmail">


            <input type="password"
                   class="form-control mb-2"
                   id="editPassword"
                   placeholder="New password">


            <select id="editRoles"
                    class="form-select mb-3"
                    multiple>

                <option value="1">
                    ADMIN
                </option>

                <option value="2">
                    USER
                </option>

            </select>


            <button class="btn btn-primary"
                    onclick="updateUser()">

                Edit

            </button>

        </div>
    </div>
</div>




<script>

    const API = "/api/admin";
    const table = document.getElementById("usersTable");

    let editModal;



    document.addEventListener("DOMContentLoaded", () => {

        editModal = new bootstrap.Modal(
            document.getElementById("editModal")
        );

        loadUsers();

    });



    function rolesToString(roles) {

        return roles
            .map(role => role.name)
            .join(" ");

    }



    function getSelectedRoles(selectId) {

        return Array.from(
            document.getElementById(selectId).selectedOptions
        ).map(option => ({
            id: Number(option.value)
        }));

    }



    function clearCreateForm() {

        document.getElementById("firstName").value = "";
        document.getElementById("lastName").value = "";
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";

    }



    async function loadUsers() {

        try {

            const response =
                await fetch(API);

            const users =
                await response.json();


            table.innerHTML = "";


            users.forEach(user => {

                const row = `

                    <tr>

                        <td>${user.id}</td>
                        <td>${user.email}</td>
                        <td>${user.firstName}</td>
                        <td>${user.lastName}</td>
                        <td>${rolesToString(user.roles)}</td>

                        <td>

                            <button
                                class="btn btn-info btn-sm"
                                onclick='openEdit(${JSON.stringify(user)})'>

                                Edit

                            </button>

                        </td>

                        <td>

                            <button
                                class="btn btn-danger btn-sm"
                                onclick="deleteUser(${user.id})">

                                Delete

                            </button>

                        </td>

                    </tr>

                `;


                table.insertAdjacentHTML(
                    "beforeend",
                    row
                );

            });

        }

        catch (error) {

            console.error(
                "LOAD ERROR:",
                error
            );

        }

    }




    async function createUser() {

        const user = {

            firstName:
            document.getElementById("firstName").value,

            lastName:
            document.getElementById("lastName").value,

            email:
            document.getElementById("email").value,

            password:
            document.getElementById("password").value,

            roles:
                getSelectedRoles("roles")

        };


        await fetch(API, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(user)

        });


        clearCreateForm();

        await loadUsers();

    }




    async function deleteUser(id) {

        await fetch(`${API}/${id}`, {

            method: "DELETE"

        });


        await loadUsers();

    }




    function openEdit(user) {

        document.getElementById("editId").value =
            user.id;

        document.getElementById("editFirstName").value =
            user.firstName;

        document.getElementById("editLastName").value =
            user.lastName;

        document.getElementById("editEmail").value =
            user.email;


        const select =
            document.getElementById("editRoles");


        Array.from(select.options)
            .forEach(option => {

                option.selected =
                    user.roles.some(
                        role => role.id == option.value
                    );

            });


        editModal.show();

    }




    async function updateUser() {

        const id =
            document.getElementById("editId").value;


        const user = {

            id: id,

            firstName:
            document.getElementById("editFirstName").value,

            lastName:
            document.getElementById("editLastName").value,

            email:
            document.getElementById("editEmail").value,

            password:
            document.getElementById("editPassword").value,

            roles:
                getSelectedRoles("editRoles")

        };


        await fetch(`${API}/${id}`, {

            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(user)

        });


        editModal.hide();

        await loadUsers();

    }

</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
