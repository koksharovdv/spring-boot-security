<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Admin panel</h2>


    <!-- USERS TABLE -->
    <div class="card mt-3">

        <div class="card-header">
            All users
        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Roles</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
                </thead>

                <tbody id="usersTable"></tbody>

            </table>

        </div>
    </div>



    <!-- CREATE -->
    <div class="card mt-4">

        <div class="card-header">
            Add new user
        </div>

        <div class="card-body">

            <input id="firstName"
                   class="form-control mb-2"
                   placeholder="First name">


            <input id="lastName"
                   class="form-control mb-2"
                   placeholder="Last name">


            <input id="email"
                   class="form-control mb-2"
                   placeholder="Email">


            <input id="password"
                   type="password"
                   class="form-control mb-2"
                   placeholder="Password">


            <select id="roles"
                    class="form-select mb-3"
                    multiple>

                <option value="1">
                    ADMIN
                </option>

                <option value="2">
                    USER
                </option>

            </select>


            <button class="btn btn-success"
                    onclick="createUser()">

                Add user

            </button>

        </div>
    </div>

</div>



<!-- EDIT MODAL -->
<div class="modal fade" id="editModal">

    <div class="modal-dialog">

        <div class="modal-content p-3">

            <input type="hidden"
                   id="editId">


            <input class="form-control mb-2"
                   id="editFirstName">


            <input class="form-control mb-2"
                   id="editLastName">


            <input class="form-control mb-2"
                   id="editEmail">


            <input type="password"
                   class="form-control mb-2"
                   id="editPassword"
                   placeholder="New password">


            <select id="editRoles"
                    class="form-select mb-3"
                    multiple>

                <option value="1">
                    ADMIN
                </option>

                <option value="2">
                    USER
                </option>

            </select>


            <button class="btn btn-primary"
                    onclick="updateUser()">

                Edit

            </button>

        </div>
    </div>
</div>




<script>

    const table =
        document.getElementById("usersTable");



    // LOAD USERS
    function loadUsers() {

        fetch("/api/users")

            .then(res => res.json())

            .then(users => {

                table.innerHTML = "";


                users.forEach(user => {

                    let roles =
                        user.roles
                            .map(r => r.name)
                            .join(" ");


                    let row = `

                        <tr>

                            <td>${user.id}</td>

                            <td>${user.email}</td>

                            <td>${user.firstName}</td>

                            <td>${user.lastName}</td>

                            <td>${roles}</td>


                            <td>

                                <button
                                    class="btn btn-info btn-sm"

                                    onclick='openEdit(
                                        ${user.id},
                                        "${user.firstName}",
                                        "${user.lastName}",
                                        "${user.email}",
                                        ${JSON.stringify(user.roles)}
                                    )'>

                                    Edit

                                </button>

                            </td>


                            <td>

                                <button
                                    class="btn btn-danger btn-sm"

                                    onclick="deleteUser(${user.id})">

                                    Delete

                                </button>

                            </td>

                        </tr>

                    `;


                    table.insertAdjacentHTML(
                        "beforeend",
                        row
                    );

                });

            });

    }




    // CREATE
    function createUser() {

        let roles =
            Array.from(
                document.getElementById(
                    "roles"
                ).selectedOptions
            )

                .map(option => ({
                    id: option.value
                }));


        let user = {

            firstName:
            document.getElementById(
                "firstName"
            ).value,


            lastName:
            document.getElementById(
                "lastName"
            ).value,


            email:
            document.getElementById(
                "email"
            ).value,


            password:
            document.getElementById(
                "password"
            ).value,


            roles: roles

        };


        fetch("/api/users", {

            method: "POST",

            headers: {
                "Content-Type":
                    "application/json"
            },

            body:
                JSON.stringify(user)

        })

            .then(() => {

                loadUsers();

            });

    }




    // DELETE
    function deleteUser(id) {

        fetch(`/api/users/${id}`, {

            method: "DELETE"

        })

            .then(() => {

                loadUsers();

            });

    }




    // OPEN EDIT
    function openEdit(
        id,
        firstName,
        lastName,
        email,
        roles
    ) {

        document.getElementById(
            "editId"
        ).value = id;


        document.getElementById(
            "editFirstName"
        ).value = firstName;


        document.getElementById(
            "editLastName"
        ).value = lastName;


        document.getElementById(
            "editEmail"
        ).value = email;


        let select =
            document.getElementById(
                "editRoles"
            );


        Array.from(
            select.options
        )

            .forEach(option => {

                option.selected =
                    roles.some(role =>
                        role.id == option.value
                    );

            });


        new bootstrap.Modal(

            document.getElementById(
                "editModal"
            )

        ).show();

    }




    // UPDATE
    function updateUser() {

        let id =
            document.getElementById(
                "editId"
            ).value;


        let roles =
            Array.from(
                document.getElementById(
                    "editRoles"
                ).selectedOptions
            )

                .map(option => ({
                    id: option.value
                }));


        let user = {

            id: id,


            firstName:
            document.getElementById(
                "editFirstName"
            ).value,


            lastName:
            document.getElementById(
                "editLastName"
            ).value,


            email:
            document.getElementById(
                "editEmail"
            ).value,


            password:
            document.getElementById(
                "editPassword"
            ).value,


            roles: roles

        };


        fetch(`/api/users/${id}`, {

            method: "PUT",

            headers: {
                "Content-Type":
                    "application/json"
            },

            body:
                JSON.stringify(user)

        })

            .then(() => {

                loadUsers();

            });

    }




    // INIT
    loadUsers();

</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
