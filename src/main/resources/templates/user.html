<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white">
        <span th:text="${#authentication.name}"></span>
        with roles:
        <span th:each="role : ${#authentication.authorities}"
              th:text="${role.authority} + ' '"></span>
    </span>

    <form th:action="@{/logout}" method="post">
        <button class="btn btn-link text-white">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-light vh-100 pt-3">
            <div class="list-group">
                <a href="/user" class="list-group-item list-group-item-action active">User</a>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="col-10 p-4">

            <h2>User information-page</h2>

            <div class="card mt-3">
                <div class="card-header">
                    About user
                </div>

                <div class="card-body">

                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.email}"></td>

                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name} + ' '"></span>
                            </td>
                        </tr>
                        </tbody>

                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
